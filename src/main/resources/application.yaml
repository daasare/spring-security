# port for serving the app
server:
  port: 1010

# app name
spring:
  application:
    name: springSecurity

# spring security login config
  security:
    user:
      name: khay
      password: password

# oauth2 config
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_SECRET}

# database credentials
  datasource:
    url: jdbc:postgresql://localhost:5432/springsecurity
    username: playground
    password: password

# jpa & hibernate properties
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true